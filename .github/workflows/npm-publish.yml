name: Publish Node.js Package to NPM registry
on:
  release:
    types: [published]
jobs:
  publish-npm:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: '24.x'
          registry-url: 'https://registry.npmjs.org'
          package-manager-cache: false
      - name: Install OIDC-capable npm
        run: npm install --global npm@11.18.0
      - run: npm ci
      - name: Assert supported TypeScript/ts-jest boundary
        run: node -e "const p=require('./node_modules/typescript/package.json'); const peer=require('./node_modules/ts-jest/package.json').peerDependencies.typescript; if (!p.version.startsWith('5.9.')) throw new Error('Unsupported TypeScript '+p.version); if (peer !== '>=4.3 <7') throw new Error('Unexpected ts-jest TypeScript peer '+peer)"
      - name: Verify release notes are present
        env:
          RELEASE_BODY: ${{ github.event.release.body }}
        run: test -n "$RELEASE_BODY"
      - run: npm run typecheck
      - run: npm run format:check
      - run: npm test
      - run: npm run verify:package
      - name: Verify publish inventory without registry mutation
        run: npm publish --dry-run --access public
      - name: Publish through npm trusted publishing
        run: npm publish --access public
